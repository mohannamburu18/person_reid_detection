# Configuration File for Person ReID System

[Pipeline]
# Frame processing
frame_skip = 2
min_frames_to_confirm = 5
lost_threshold = 45

[Detection]
# YOLO parameters
yolo_model = yolov8m.pt
min_confidence = 0.45
iou_threshold = 0.4
tracker = botsort.yaml

# Detection quality filters
min_person_height = 100
min_person_width = 40
max_aspect_ratio = 4.5
min_aspect_ratio = 1.5

[ReID]
# Feature extraction
use_deep_features = True
reid_threshold = 0.65
max_gallery_size = 10

# Constraints
enable_spatial_constraint = True
enable_temporal_constraint = True
spatial_penalty = 1.3
temporal_penalty_min = 1.2
temporal_penalty_max = 1.1

[Paths]
# Data directories
video_dir = data/fake_cctv_videos
dataset_dir = data/Market-1501/bounding_box_test
output_dir = outputs

[Camera_Topology]
# Define which cameras are connected (comma-separated)
c1 = c2,c3,c4
c2 = c1,c3,c5
c3 = c1,c2,c4,c6
c4 = c1,c3,c5,c6
c5 = c2,c4,c6
c6 = c3,c4,c5
